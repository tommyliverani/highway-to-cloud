name: templater

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: 'Operation ID (matches the folder name inside ./templates)'
        required: true
        type: string
      backstage_params:
        description: 'JSON string containing Backstage input parameters'
        required: true
        type: string
      resource_id:
        description: 'Target Resource ID (matches the destination folder inside ./resources)'
        required: true
        type: string

jobs:
  templater:
    runs-on: ubuntu-latest

    steps:
      # 1) Clone the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Setup Node.js and install nunjucks-cli
      - name: Setup Node.js and Install Nunjucks CLI
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Nunjucks CLI
        run: npm install -g nunjucks-cli

      # 3) Copy ONLY the subdirectories to the resource folder
      - name: Copy template directories only
        run: |
          SRC_DIR="./templates/${{ github.event.inputs.operation_id }}"
          DEST_DIR="./resources/${{ github.event.inputs.resource_id }}"
          
          if [ ! -d "$SRC_DIR" ]; then
            echo "::error::Source directory $SRC_DIR does not exist!"
            exit 1
          fi

          mkdir -p "$DEST_DIR"

          for item in "$SRC_DIR"/*; do
            if [ -d "$item" ]; then
              cp -r "$item" "$DEST_DIR/"
            fi
          done

      # 4) Aggregate interfaces and JSON to a temporary context JSON file
      - name: Generate template context
        run: |
          INT_DIR="./interfaces/${{ github.event.inputs.operation_id }}"
          CONTEXT_FILE="/tmp/context.json"
          
          echo "{}" > "$OUTPUT_FILE" # Inizializza oggetto vuoto JSON
          echo "{}" > "$CONTEXT_FILE"
          
          if [ -d "$INT_DIR" ]; then
            for sub_dir in "$INT_DIR"/*; do
              if [ -d "$sub_dir" ]; then
                export INTERFACE_ID=$(basename "$sub_dir")
                export VAR_FILE="$sub_dir/variables.yaml"
                
                if [ -f "$VAR_FILE" ]; then
                  yq eval -o=json '.[strenv(INTERFACE_ID)] = load(strenv(VAR_FILE))' -i "$CONTEXT_FILE"
                fi
              fi
            done
          fi

          # Append Backstage parameters directly into the JSON context
          echo '${{ github.event.inputs.backstage_params }}' > /tmp/params.json
          yq eval -o=json '.parameters = load("/tmp/params.json")' -i "$CONTEXT_FILE"

      # 5) Render Nunjucks (.njk) templates into actual .yaml files
      - name: Render Nunjucks templates
        run: |
          SRC_DIR="./templates/${{ github.event.inputs.operation_id }}"
          DEST_DIR="./resources/${{ github.event.inputs.resource_id }}"
          CONTEXT_FILE="/tmp/context.json"

          echo "Rendering Backstage Nunjucks templates..."

          # Render catalog-info.njk -> catalog-info.yaml
          if [ -f "$SRC_DIR/catalog-info.njk" ]; then
            echo "Rendering catalog-info.njk"
            nunjucks "$SRC_DIR/catalog-info.njk" --data "$CONTEXT_FILE" > "$DEST_DIR/catalog-info.yaml"
          fi

          # Render variables.njk -> variables.yaml
          if [ -f "$SRC_DIR/variables.njk" ]; then
            echo "Rendering variables.njk"
            nunjucks "$SRC_DIR/variables.njk" --data "$CONTEXT_FILE" > "$DEST_DIR/variables.yaml"
          fi

          echo "Rendering completed! Final target directory structure:"
          ls -la "$DEST_DIR"