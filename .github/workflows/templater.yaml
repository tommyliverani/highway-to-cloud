name: templater

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: 'Operation ID (matches the folder name inside ./templates)'
        required: true
        type: string
      backstage_params:
        description: 'JSON string containing Backstage input parameters'
        required: true
        type: string
      resource_id:
        description: 'Target Resource ID (matches the destination folder inside ./resources)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  templater:
    runs-on: ubuntu-latest

    steps:
      # 1) Clone the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Setup Node.js and install core nunjucks package
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Nunjucks Core
        run: npm install nunjucks js-yaml

      # 3) Aggregate interfaces and JSON to a temporary context JSON file
      - name: Generate template context
        run: |
          node -e '
          const fs = require("fs");
          const path = require("path");
          const yaml = require("js-yaml");

          const interfaceDir = "./interfaces/${{ github.event.inputs.operation_id }}";
          const contextFile = "/tmp/context.json";
          const context = {};

          if (fs.existsSync(interfaceDir)) {
            for (const entry of fs.readdirSync(interfaceDir, { withFileTypes: true })) {
              if (!entry.isDirectory()) {
                continue;
              }

              const interfaceId = entry.name;
              const variablesPath = path.join(interfaceDir, interfaceId, "variables.yaml");
              if (!fs.existsSync(variablesPath)) {
                continue;
              }

              context[interfaceId] = yaml.load(fs.readFileSync(variablesPath, "utf8")) || {};
            }
          }

          context.parameters = JSON.parse(`${{ github.event.inputs.backstage_params }}`);
          fs.writeFileSync(contextFile, JSON.stringify(context, null, 2));
          '

      # 4) Render templates and copy declared building blocks
      - name: Render Nunjucks templates and copy building blocks
        run: |
          node -e '
          const njk = require("nunjucks");
          const fs = require("fs");
          const path = require("path");
          const yaml = require("js-yaml");

          const srcDir = "./templates/${{ github.event.inputs.operation_id }}";
          const destDir = "./resources/${{ github.event.inputs.resource_id }}";
          const destVariablesPath = path.join(destDir, "variables.yaml");
          const rawContext = JSON.parse(fs.readFileSync("/tmp/context.json", "utf8"));

          fs.mkdirSync(destDir, { recursive: true });

          const existingValues = fs.existsSync(destVariablesPath)
            ? (yaml.load(fs.readFileSync(destVariablesPath, "utf8")) || {})
            : {};

          // Risolviamo i typo mappando le variabili in un contesto piatto
          const parameters = rawContext.parameters || {};
          const platform = rawContext.platform || {};
          const security = rawContext.security || rawContext.secuirty || {};
          const secuirty = rawContext.security || rawContext.secuirty || {};

          // Contesto finale pulito (senza l&apos;oggetto values intermedio)
          const context = {
            parameters,
            prameters: parameters, // Mappa il typo {{ prameters.title }} in catalog-info.njk
            platform,
            security,
            secuirty,              // Mappa il typo {{ secuirty.kms_key }} in variables.njk
            values: existingValues
          };

          const env = njk.configure(srcDir, { autoescape: false });

          // Filtro kebabCase per il metadata.name di catalog-info.njk
          env.addFilter("kebabCase", (str) => {
            if (!str) return "";
            return str.toString().trim()
              .replace(/([a-z])([A-Z])/g, "$1-$2")
              .replace(/[\s_]+/g, "-")
              .toLowerCase();
          });

          env.addFilter("camelCase", (str) => {
            if (!str) return "";
            return str.toString().trim().replace(/[-_\s]+(.)?/g, (_, c) => c ? c.toUpperCase() : "");
          });

          env.addFilter("snakeCase", (str) => {
            if (!str) return "";
            return str.toString().trim().replace(/([a-z])([A-Z])/g, "$1_$2").replace(/[\s-]+/g, "_").toLowerCase();
          });

          const hasSourceCatalogInfo = fs.existsSync(path.join(srcDir, "catalog-info.njk"));
          const hasSourceVariablesTemplate = fs.existsSync(path.join(srcDir, "variables.njk"));
          const hasSourceVariablesFile = fs.existsSync(path.join(srcDir, "variables.yaml"));
          const templates = [];

          if (hasSourceVariablesTemplate) {
            templates.push("variables.njk");
          }

          if (hasSourceCatalogInfo) {
            templates.unshift("catalog-info.njk");
          } else {
            console.log("catalog-info.njk not found in source template, skipping catalog-info rendering and building block copy.");
          }

          templates.forEach(file => {
            const srcPath = path.join(srcDir, file);
            if (fs.existsSync(srcPath)) {
              console.log(`Rendering ${file}...`);
              const rendered = env.render(file, context);
              
              const outputName = file.replace(".njk", ".yaml");
              fs.writeFileSync(path.join(destDir, outputName), rendered);
            }
          });

          if (!hasSourceVariablesTemplate && hasSourceVariablesFile) {
            console.log("variables.njk not found, copying variables.yaml from source template.");
            fs.copyFileSync(path.join(srcDir, "variables.yaml"), destVariablesPath);
          }

          if (hasSourceCatalogInfo) {
            const catalogInfoPath = path.join(destDir, "catalog-info.yaml");
            if (!fs.existsSync(catalogInfoPath)) {
              throw new Error(`Generated catalog-info.yaml not found in ${destDir}`);
            }

            const catalogInfo = yaml.load(fs.readFileSync(catalogInfoPath, "utf8")) || {};
            const metadata = catalogInfo.metadata || {};
            const declaredBlocks = metadata.building_blocks || metadata.builcing_blocks || metadata.build_blocks || [];

            if (!Array.isArray(declaredBlocks)) {
              throw new Error("metadata.building_blocks must be an array");
            }

            const copyDirectory = (sourceDir, targetDir) => {
              fs.mkdirSync(targetDir, { recursive: true });
              for (const entry of fs.readdirSync(sourceDir, { withFileTypes: true })) {
                const sourcePath = path.join(sourceDir, entry.name);
                const targetPath = path.join(targetDir, entry.name);
                if (entry.isDirectory()) {
                  copyDirectory(sourcePath, targetPath);
                } else {
                  fs.copyFileSync(sourcePath, targetPath);
                }
              }
            };

            const normalizeRepoPath = (repoPath) => {
              if (!repoPath) {
                return "";
              }
              return repoPath.replace(/^\/+/, "").replace(/^\.\//, "");
            };

            declaredBlocks.forEach((block, index) => {
              if (!block || typeof block !== "object") {
                throw new Error(`Building block at index ${index} is invalid`);
              }

              const subpathValue = block.subpath || block.target_subpath;
              const sourceRepoPath = normalizeRepoPath(block.source_repo_path || block.repo_path);
              const sourceRepoUrl = block.source_repo_url || block.repo_url || "";

              if (!subpathValue) {
                throw new Error(`Building block at index ${index} is missing subpath`);
              }

              if (!sourceRepoPath) {
                throw new Error(`Building block at index ${index} is missing source_repo_path`);
              }

              const normalizedSubpath = subpathValue.replace(/^\.\//, "").replace(/^\/+/, "");
              const sourceDir = path.resolve(process.cwd(), sourceRepoPath);
              const targetDir = path.resolve(destDir, normalizedSubpath);

              if (sourceRepoUrl && !sourceRepoUrl.includes("highway-to-cloud")) {
                throw new Error(`Unsupported source_repo_url for building block ${sourceRepoUrl}`);
              }

              if (!fs.existsSync(sourceDir) || !fs.statSync(sourceDir).isDirectory()) {
                throw new Error(`Building block source directory not found: ${sourceDir}`);
              }

              console.log(`Copying building block ${sourceRepoPath} to ${targetDir}`);
              copyDirectory(sourceDir, targetDir);
            });
          }
          '

      # 5) Clean up Node modules and temporary files
      - name: Clean workspace dependencies
        run: |
          rm -rf node_modules
          rm -f package.json package-lock.json

      # 6) Create and Open a Pull Request on GitHub
      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: render templates for ${{ github.event.inputs.resource_id }}"
          branch: "feature/${{ github.event.inputs.operation_id }}_${{ github.event.inputs.resource_id }}"
          delete-branch: true
          title: "Feature: ${{ github.event.inputs.operation_id }} - ${{ github.event.inputs.resource_id }}"
          body: |
            ### 🚀 Template Rendered Automatically
            Questa Pull Request è stata aperta automaticamente dal workflow `templater`.
            
            - **Operation ID**: `${{ github.event.inputs.operation_id }}`
            - **Resource ID**: `${{ github.event.inputs.resource_id }}`
          base: ${{ github.ref_name }}