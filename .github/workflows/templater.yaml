name: Execute Operation from Backstage

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: 'Operation ID (matches the folder name inside ./templates)'
        required: true
        type: string
      backstage_params:
        description: 'JSON string containing Backstage input parameters'
        required: true
        type: string
      resource_id:
        description: 'Target Resource ID (matches the destination folder inside ./resources)'
        required: true
        type: string

jobs:
  execute-template-copy:
    runs-on: ubuntu-latest

    steps:
      # 1) Clone the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Copy ONLY the subdirectories from the template folder to the resource folder
      - name: Copy template directories only
        run: |
          SRC_DIR="./templates/${{ github.event.inputs.operation_id }}"
          DEST_DIR="./resources/${{ github.event.inputs.resource_id }}"
          
          echo "Checking if source directory exists: $SRC_DIR"
          if [ ! -d "$SRC_DIR" ]; then
            echo "::error::Source directory $SRC_DIR does not exist!"
            exit 1
          fi

          echo "Creating destination directory: $DEST_DIR"
          mkdir -p "$DEST_DIR"

          echo "Scanning $SRC_DIR for subdirectories..."
          # Loop through all items inside the source directory
          for item in "$SRC_DIR"/*; do
            # Check if the item is a directory
            if [ -d "$item" ]; then
              echo "Copying directory: $(basename "$item")"
              cp -r "$item" "$DEST_DIR/"
            fi
          done

          echo "Copy completed successfully!"
          echo "Current contents of $DEST_DIR:"
          ls -la "$DEST_DIR"

      # 3) Optional debug step to verify input parameters
      - name: Log operation metadata
        run: |
          echo "Operation $OPERATION_ID completed for resource $RESOURCE_ID."
        env:
          OPERATION_ID: ${{ github.event.inputs.operation_id }}
          RESOURCE_ID: ${{ github.event.inputs.resource_id }}