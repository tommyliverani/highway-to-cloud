name: templater

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: 'Operation ID (matches the folder name inside ./templates)'
        required: true
        type: string
      backstage_params:
        description: 'JSON string containing Backstage input parameters'
        required: true
        type: string
      resource_id:
        description: 'Target Resource ID (matches the destination folder inside ./resources)'
        required: true
        type: string

# Permesso di scrittura sui contenuti del repo per poter fare il push del codice
permissions:
  contents: write

jobs:
  templater:
    runs-on: ubuntu-latest

    steps:
      # 1) Clone the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Setup Node.js and install core nunjucks package
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Nunjucks Core
        run: npm install nunjucks

      # 3) Copy ONLY the subdirectories to the resource folder
      - name: Copy template directories only
        run: |
          SRC_DIR="./templates/${{ github.event.inputs.operation_id }}"
          DEST_DIR="./resources/${{ github.event.inputs.resource_id }}"
          
          if [ ! -d "$SRC_DIR" ]; then
            echo "::error::Source directory $SRC_DIR does not exist!"
            exit 1
          fi

          mkdir -p "$DEST_DIR"

          for item in "$SRC_DIR"/*; do
            if [ -d "$item" ]; then
              cp -r "$item" "$DEST_DIR/"
            fi
          done

      # 4) Aggregate interfaces and JSON to a temporary context JSON file
      - name: Generate template context
        run: |
          INT_DIR="./interfaces/${{ github.event.inputs.operation_id }}"
          CONTEXT_FILE="/tmp/context.json"
          
          echo "{}" > "$CONTEXT_FILE"
          
          if [ -d "$INT_DIR" ]; then
            for sub_dir in "$INT_DIR"/*; do
              if [ -d "$sub_dir" ]; then
                export INTERFACE_ID=$(basename "$sub_dir")
                export VAR_FILE="$sub_dir/variables.yaml"
                
                if [ -f "$VAR_FILE" ]; then
                  yq eval -o=json '.[strenv(INTERFACE_ID)] = load(strenv(VAR_FILE))' -i "$CONTEXT_FILE"
                fi
              fi
            done
          fi

          # Append Backstage parameters directly into the JSON context
          echo '${{ github.event.inputs.backstage_params }}' > /tmp/params.json
          yq eval -o=json '.parameters = load("/tmp/params.json")' -i "$CONTEXT_FILE"

      # 5) Render templates using native Node script + Custom Backstage Filters
      - name: Render Nunjucks templates
        run: |
          node -e '
          const njk = require("nunjucks");
          const fs = require("fs");
          const path = require("path");

          const srcDir = "./templates/${{ github.event.inputs.operation_id }}";
          const destDir = "./resources/${{ github.event.inputs.resource_id }}";
          const context = JSON.parse(fs.readFileSync("/tmp/context.json", "utf8"));

          const env = njk.configure(srcDir, { autoescape: false });

          env.addFilter("kebabCase", (str) => {
            if (!str) return "";
            return str.toString().trim()
              .replace(/([a-z])([A-Z])/g, "$1-$2")
              .replace(/[\s_]+/g, "-")
              .toLowerCase();
          });

          env.addFilter("camelCase", (str) => {
            if (!str) return "";
            return str.toString().trim()
              .replace(/[-_\s]+(.)?/g, (_, c) => c ? c.toUpperCase() : "");
          });

          env.addFilter("snakeCase", (str) => {
            if (!str) return "";
            return str.toString().trim()
              .replace(/([a-z])([A-Z])/g, "$1_$2")
              .replace(/[\s-]+/g, "_")
              .toLowerCase();
          });

          const templates = ["catalog-info.njk", "variables.njk"];

          templates.forEach(file => {
            const srcPath = path.join(srcDir, file);
            if (fs.existsSync(srcPath)) {
              console.log(`Rendering ${file}...`);
              const rendered = env.render(file, context);
              
              const outputName = file.replace(".njk", ".yaml");
              fs.writeFileSync(path.join(destDir, outputName), rendered);
            }
          });
          '

      # 6) Configure Git, commit changes, and push back to the repository
      - name: Git Push Changes
        run: |
          # Configura l'utente Git usando il bot di GitHub Actions
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tracciamo i file dentro resources
          git add ./resources/
          
          # Verifichiamo se ci sono modifiche reali per evitare che il commit fallisca
          if git diff-index --quiet HEAD --; then
            echo "No changes detected. Skipping push."
          else
            echo "Changes detected, committing..."
            git commit -m "chore: executed operation ${{ github.event.inputs.operation_id }} for ${{ github.event.inputs.resource_id }}"
            
            echo "Pushing changes to branch..."
            git push origin HEAD:${{ github.ref_name }}
          fi