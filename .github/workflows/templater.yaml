name: templater

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: 'Operation ID (matches the folder name inside ./templates)'
        required: true
        type: string
      backstage_params:
        description: 'JSON string containing Backstage input parameters'
        required: true
        type: string
      resource_id:
        description: 'Target Resource ID (matches the destination folder inside ./resources)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  templater:
    runs-on: ubuntu-latest

    steps:
      # 1) Clone the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Setup Node.js and install core nunjucks package
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Nunjucks Core
        run: npm install nunjucks

      # 3) Copy ONLY the subdirectories to the resource folder
      - name: Copy template directories only
        run: |
          SRC_DIR="./templates/${{ github.event.inputs.operation_id }}"
          DEST_DIR="./resources/${{ github.event.inputs.resource_id }}"
          
          if [ ! -d "$SRC_DIR" ]; then
            echo "::error::Source directory $SRC_DIR does not exist!"
            exit 1
          fi

          mkdir -p "$DEST_DIR"

          for item in "$SRC_DIR"/*; do
            if [ -d "$item" ]; then
              cp -r "$item" "$DEST_DIR/"
            fi
          done

      # 4) Aggregate interfaces and JSON to a temporary context JSON file
      - name: Generate template context
        run: |
          INT_DIR="./interfaces/${{ github.event.inputs.operation_id }}"
          CONTEXT_FILE="/tmp/context.json"
          
          echo "{}" > "$CONTEXT_FILE"
          
          if [ -d "$INT_DIR" ]; then
            for sub_dir in "$INT_DIR"/*; do
              if [ -d "$sub_dir" ]; then
                export INTERFACE_ID=$(basename "$sub_dir")
                export VAR_FILE="$sub_dir/variables.yaml"
                
                if [ -f "$VAR_FILE" ]; then
                  yq eval -o=json '.[strenv(INTERFACE_ID)] = load(strenv(VAR_FILE))' -i "$CONTEXT_FILE"
                fi
              fi
            done
          fi

          # Append Backstage parameters directly into the JSON context
          echo '${{ github.event.inputs.backstage_params }}' > /tmp/params.json
          yq eval -o=json '.parameters = load("/tmp/params.json")' -i "$CONTEXT_FILE"

      # 5) Render templates using native Node script + Custom Backstage Filters & Wrapper
      - name: Render Nunjucks templates
        run: |
          node -e '
          const njk = require("nunjucks");
          const fs = require("fs");
          const path = require("path");

          const srcDir = "./templates/${{ github.event.inputs.operation_id }}";
          const destDir = "./resources/${{ github.event.inputs.resource_id }}";
          const rawContext = JSON.parse(fs.readFileSync("/tmp/context.json", "utf8"));

          const context = {
            values: {
              parameters: rawContext.parameters || {},
              prameters: rawContext.parameters || {},
              platform: rawContext.platform || {},
              security: rawContext.security || rawContext.secuirty || {},
              secuirty: rawContext.security || rawContext.secuirty || {}
            }
          };

          const env = njk.configure(srcDir, { autoescape: false });

          env.addFilter("kebabCase", (str) => {
            if (!str) return "";
            return str.toString().trim().replace(/([a-z])([A-Z])/g, "$1-$2").replace(/[\s_]+/g, "-").toLowerCase();
          });

          env.addFilter("camelCase", (str) => {
            if (!str) return "";
            return str.toString().trim().replace(/[-_\s]+(.)?/g, (_, c) => c ? c.toUpperCase() : "");
          });

          env.addFilter("snakeCase", (str) => {
            if (!str) return "";
            return str.toString().trim().replace(/([a-z])([A-Z])/g, "$1_$2").replace(/[\s-]+/g, "_").toLowerCase();
          });

          const templates = ["catalog-info.njk", "variables.njk"];

          templates.forEach(file => {
            const srcPath = path.join(srcDir, file);
            if (fs.existsSync(srcPath)) {
              console.log(`Rendering ${file}...`);
              const rendered = env.render(file, context);
              
              const outputName = file.replace(".njk", ".yaml");
              fs.writeFileSync(path.join(destDir, outputName), rendered);
            }
          });
          '

      # 6) Create and Open a Pull Request on GitHub using a feature branch
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: render templates for ${{ github.event.inputs.resource_id }}"
          branch: "feature/${{ github.event.inputs.operation_id }}_${{ github.event.inputs.resource_id }}"
          delete-branch: true
          title: "Feature: ${{ github.event.inputs.operation_id }} - ${{ github.event.inputs.resource_id }}"
          body: |
            ### 🚀 Template Rendered Automatically
            Questa Pull Request è stata aperta automaticamente dal workflow `templater`.
            
            - **Operation ID**: `${{ github.event.inputs.operation_id }}`
            - **Resource ID**: `${{ github.event.inputs.resource_id }}`
            
            Verifica i file generati nella cartella `./resources/` prima di effettuare il merge su `main`.
          base: ${{ github.ref_name }}