name: Execute Operation from Backstage

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: 'Operation ID (matches the folder name inside ./templates)'
        required: true
        type: string
      backstage_params:
        description: 'JSON string containing Backstage input parameters'
        required: true
        type: string
      resource_id:
        description: 'Target Resource ID (matches the destination folder inside ./resources)'
        required: true
        type: string

jobs:
  execute-template-copy:
    runs-on: ubuntu-latest

    steps:
      # 1) Clone the current repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Copy the directories from ./templates/operation_id to resources/resource_id
      - name: Copy template assets
        run: |
          # Define source and destination paths based on inputs
          SRC_DIR="./templates/${{ github.event.inputs.operation_id }}"
          DEST_DIR="./resources/${{ github.event.inputs.resource_id }}"
          
          echo "Checking if source directory exists: $SRC_DIR"
          if [ ! -d "$SRC_DIR" ]; then
            echo "::error::Source directory $SRC_DIR does not exist!"
            exit 1
          fi

          echo "Creating destination directory (if it does not exist): $DEST_DIR"
          mkdir -p "$DEST_DIR"

          echo "Copying contents from $SRC_DIR to $DEST_DIR..."
          # The cp -r command with /. copies all files and subdirectories recursively
          cp -r $SRC_DIR/. $DEST_DIR/

          echo "Copy completed successfully!"
          echo "Current contents of $DEST_DIR:"
          ls -la "$DEST_DIR"