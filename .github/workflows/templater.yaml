name: Templater

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: 'Operation ID (matches the folder name inside ./templates)'
        required: true
        type: string
      backstage_params:
        description: 'JSON string containing Backstage input parameters'
        required: true
        type: string
      resource_id:
        description: 'Target Resource ID (matches the destination folder inside ./resources)'
        required: true
        type: string

jobs:
  templater:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy template assets
              run: |
                SRC_DIR="./templates/${{ github.event.inputs.operation_id }}"
                DEST_DIR="./resources/${{ github.event.inputs.resource_id }}"
                
                if [ ! -d "$SRC_DIR" ]; then
                  echo "::error::Source directory $SRC_DIR does not exist!"
                  exit 1
                fi

                echo "Creating destination directory: $DEST_DIR"
                mkdir -p "$DEST_DIR"

                echo "Copying only subdirectories from $SRC_DIR..."
                for item in "$SRC_DIR"/*; do
                  if [ -d "$item" ]; then
                    echo "Copying directory: $(basename "$item")"
                    cp -r "$item" "$DEST_DIR/"
                  fi
                done

                echo "Process completed!"
                echo "Current contents of $DEST_DIR:"
                ls -la "$DEST_DIR"
