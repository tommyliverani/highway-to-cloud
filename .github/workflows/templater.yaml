name: templater


on:

  workflow_dispatch:

    inputs:

      pull_request_number:
        description: 'Pull Request number generated by templater'
        required: true
        type: string


      resource_id:
        description: 'Resource folder inside ./resources'
        required: true
        type: string


permissions:

  contents: read
  pull-requests: write



jobs:


  templater:


    runs-on: ubuntu-latest



    steps:


      # 1) Recupera commit della PR
      - name: Get Pull Request information
        id: pr
        uses: actions/github-script@v7

        with:

          script: |

            const prNumber = Number(
              context.payload.inputs.pull_request_number
            );


            const { data: pr } =
              await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });


            core.setOutput(
              "sha",
              pr.head.sha
            );


      # 2) Checkout codice della PR
      - name: Checkout PR code

        uses: actions/checkout@v4

        with:

          ref: ${{ steps.pr.outputs.sha }}

          fetch-depth: 0



      # 3) Setup Terraform
      - name: Setup Terraform

        uses: hashicorp/setup-terraform@v3



      # 4) Install yq per convertire yaml -> json
      - name: Install yq

        run: |

          sudo snap install yq



      # 5) Prepara variabili Terraform
      - name: Prepare Terraform variables

        working-directory: ./resources/${{ github.event.inputs.resource_id }}

        run: |


          if [ ! -f "variables.yaml" ]; then

            echo "::error::variables.yaml not found"

            exit 1

          fi



          echo "Converting variables.yaml to JSON"


          yq eval -o=json variables.yaml > terraform-vars.json



          echo "Generated terraform-vars.json"


          cat terraform-vars.json



          echo "Export terraform variables"



          while IFS="=" read -r key value

          do

            echo "$key=$value" >> $GITHUB_ENV

          done < <(

            jq -r '

            to_entries[]

            | "TF_VAR_\(.key)=\(.value)"

            ' terraform-vars.json

          )



      # 6) Terraform init
      - name: Terraform Init

        working-directory: ./resources/${{ github.event.inputs.resource_id }}

        env:

          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ADMIN_ACCESS_KEY }}

          AWS_SECRET_ACCESS_KEY: ${{ secrets.ADMIN_SECRET_ACCESS_KEY }}


        run: |

          terraform init



      # 7) Terraform apply
      - name: Terraform Apply

        working-directory: ./resources/${{ github.event.inputs.resource_id }}

        env:

          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ADMIN_ACCESS_KEY }}

          AWS_SECRET_ACCESS_KEY: ${{ secrets.ADMIN_SECRET_ACCESS_KEY }}


        run: |

          terraform apply \
          -auto-approve



      # 8) Chiudi PR dopo deploy riuscito
      - name: Close Pull Request

        if: success()

        uses: actions/github-script@v7


        with:

          script: |


            const prNumber = Number(
              context.payload.inputs.pull_request_number
            );


            await github.rest.pulls.update({

              owner: context.repo.owner,

              repo: context.repo.repo,

              pull_number: prNumber,

              state: "closed"

            });


            console.log(
              `PR #${prNumber} closed after successful deployment`
            );