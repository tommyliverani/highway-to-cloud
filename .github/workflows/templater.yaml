name: Execute Operation from Backstage

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: 'Operation ID (matches the folder name inside ./templates)'
        required: true
        type: string
      backstage_params:
        description: 'JSON string containing Backstage input parameters'
        required: true
        type: string
      resource_id:
        description: 'Target Resource ID (matches the destination folder inside ./resources)'
        required: true
        type: string

jobs:
  execute-template-copy:
    runs-on: ubuntu-latest

    steps:
      # 1) Clone the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Copy ONLY the subdirectories from the template folder to the resource folder
      - name: Copy template directories only
        run: |
          SRC_DIR="./templates/${{ github.event.inputs.operation_id }}"
          DEST_DIR="./resources/${{ github.event.inputs.resource_id }}"
          
          if [ ! -d "$SRC_DIR" ]; then
            echo "::error::Source directory $SRC_DIR does not exist!"
            exit 1
          fi

          mkdir -p "$DEST_DIR"

          for item in "$SRC_DIR"/*; do
            if [ -d "$item" ]; then
              cp -r "$item" "$DEST_DIR/"
            fi
          done

      # 3) Aggregate interface variables and merge input JSON parameters
      - name: Aggregate interfaces and parameters
        run: |
          INT_DIR="./interfaces/${{ github.event.inputs.operation_id }}"
          OUTPUT_FILE="./resources/${{ github.event.inputs.resource_id }}/merged-config.yaml"
          
          echo "Initializing empty output YAML file..."
          echo "{}" > "$OUTPUT_FILE"
          
          if [ -d "$INT_DIR" ]; then
            echo "Scanning interfaces in: $INT_DIR"
            
            for sub_dir in "$INT_DIR"/*; do
              if [ -d "$sub_dir" ]; then
                export INTERFACE_ID=$(basename "$sub_dir")
                export VAR_FILE="$sub_dir/variables.yaml"
                
                if [ -f "$VAR_FILE" ]; then
                  echo "Processing interface: $INTERFACE_ID"
                  yq eval '.[strenv(INTERFACE_ID)] = load(strenv(VAR_FILE))' -i "$OUTPUT_FILE"
                else
                  echo "::warning::File $VAR_FILE not found, skipping."
                fi
              fi
            done
          else
            echo "::warning::Interfaces directory $INT_DIR does not exist. Skipping interfaces loop."
          fi

          # 4) Append the 'parameters' key converting JSON to true YAML object
          echo "Appending Backstage input parameters..."
          
          # Salviamo la stringa JSON in un file temporaneo
          echo '${{ github.event.inputs.backstage_params }}' > /tmp/params.json
          
          # Convertiamo esplicitamente il file da JSON a YAML usando l'opzione -p (parser) di yq v4
          yq eval -p=json '.' /tmp/params.json > /tmp/params.yaml
          
          # Ora lo carichiamo come un blocco YAML pulito sotto la chiave 'parameters'
          yq eval '.parameters = load("/tmp/params.yaml")' -i "$OUTPUT_FILE"

          echo "Aggregation completed successfully!"
          echo "=== Final Output File Content ==="
          cat "$OUTPUT_FILE"