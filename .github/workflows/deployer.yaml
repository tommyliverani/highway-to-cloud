name: terraform-apply-pr

on:
  workflow_dispatch:

    inputs:

      pull_request_number:
        description: 'Pull Request number generated by templater'
        required: true
        type: string

      terraform_path:
        description: 'Path containing Terraform files'
        required: false
        default: '.'
        type: string


permissions:

  contents: read
  pull-requests: write


jobs:

  terraform-apply:


    runs-on: ubuntu-latest


    steps:


      # 1) Recupera informazioni PR
      - name: Get Pull Request information
        id: pr
        uses: actions/github-script@v7

        with:

          script: |

            const prNumber = Number(
              context.payload.inputs.pull_request_number
            );


            const { data: pr } =
              await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });


            core.setOutput(
              "sha",
              pr.head.sha
            );



      # 2) Checkout codice PR
      - name: Checkout PR code

        uses: actions/checkout@v4

        with:

          ref: ${{ steps.pr.outputs.sha }}

          fetch-depth: 0



      # 3) Setup Terraform
      - name: Setup Terraform

        uses: hashicorp/setup-terraform@v3



      # 4) Check AWS credentials
      - name: Check AWS credentials

        env:

          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ADMIN_ACCESS_KEY }}

          AWS_SECRET_ACCESS_KEY: ${{ secrets.ADMIN_SECRET_ACCESS_KEY }}


        run: |

          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::AWS_ADMIN_ACCESS_KEY missing"
            exit 1
          fi


          if [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "::error::ADMIN_SECRET_ACCESS_KEY missing"
            exit 1
          fi


          echo "AWS credentials configured"



      # 5) Terraform Init
      - name: Terraform Init

        working-directory: ${{ github.event.inputs.terraform_path }}

        env:

          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ADMIN_ACCESS_KEY }}

          AWS_SECRET_ACCESS_KEY: ${{ secrets.ADMIN_SECRET_ACCESS_KEY }}


        run: |

          terraform init



      # 6) Terraform Apply
      - name: Terraform Apply

        working-directory: ${{ github.event.inputs.terraform_path }}

        env:

          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ADMIN_ACCESS_KEY }}

          AWS_SECRET_ACCESS_KEY: ${{ secrets.ADMIN_SECRET_ACCESS_KEY }}


        run: |

          terraform apply \
            -auto-approve



      # 7) Chiudi PR se il deploy è riuscito
      - name: Close Pull Request after successful deploy

        if: success()

        uses: actions/github-script@v7

        with:

          script: |

            const prNumber = Number(
              context.payload.inputs.pull_request_number
            );


            await github.rest.pulls.update({

              owner: context.repo.owner,

              repo: context.repo.repo,

              pull_number: prNumber,

              state: "closed"

            });


            console.log(
              `Pull Request #${prNumber} closed after successful terraform apply`
            );