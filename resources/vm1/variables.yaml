name: vm1
ami: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
instance_type: t3.micro
account_id: 311618538285
region: eu-central-1
inline_policy_statements:
  - Sid: "S3BucketListAndLocation"
    Effect: "Allow"
    Action:
      - "s3:ListBucket"
      - "s3:GetBucketLocation"
    Resource: 
      - "arn:aws:s3:::bucket1"
  - Sid: "S3BucketObjectAccess"
    Effect: "Allow"
    Action:
      - "s3:GetObject"
      - "s3:GetObjectVersion"
      - "s3:PutObject"
      - "s3:PutObjectAcl"
      - "s3:DeleteObject"
      - "s3:DeleteObjectVersion"
    Resource: 
      - "arn:aws:s3:::bucket1/*"
