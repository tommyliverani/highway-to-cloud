apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: create-remote-storage
  title: Create remote storage
  description: Automatizza la creazione di uno storage remoto

spec:
  owner: team-platform
  type: infrastructure

  parameters:
    - title: Dettagli dello Storage
      required:
        - storageName
      properties:
        storageName:
          title: Nome dello Storage
          type: string
          description: Verrà validato secondo le convenzioni AWS.

  steps:

    - id: clone-resource-repo
      name: Clone resources repository
      action: fetch:plain
      input:
        url: https://github.com/tommyliverani/highway-to-cloud.git
        targetPath: ./resources
    
    - id: clone-template-repo
      name: Clone template repository
      action: fetch:plain
      input:
        url: https://github.com/tommyliverani/highway-to-cloud.git
        targetPath: ./templates

    - id: generate-storage-files
      name: Generate storage files
      action: fetch:template
      input:
        url: ./templates/s3_bucket
        targetPath: ./resources/${{ parameters.storageName }}
        values:
          storageName: ${{ parameters.storageName }}
    
    - id: generate-storage-vars
      name: Generate storage variables
      action: fetch:template
      input:
        url: ./templates/s3_bucket
        targetPath: ./resources/${{ parameters.storageName }}
        values:
          storageName: ${{ parameters.storageName }}

    

    


