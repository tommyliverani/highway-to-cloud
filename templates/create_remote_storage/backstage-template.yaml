apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: create-remote-storage
  title: Create remote storage
  description: Automatizza la creazione di uno storage remoto

spec:
  owner: team-platform
  type: infrastructure

  parameters:
    - title: Dettagli dello Storage
      required:
        - name
      properties:
        name:
          title: Nome dello Storage
          type: string
          description: Nome dello storage che verrà creato

  steps:
    - id: run-templater-workflow
      name: Run templater workflow
      action: github:actions:dispatch
      input:
        repoUrl: github.com?owner=tommyliverani&repo=highway-to-cloud
        workflowId: templater.yaml
        branchOrTagName: main
        workflowInputs:
          operation_id: create_remote_storage
          resource_id: ${{ parameters.name }}
          backstage_params: >-
            {"name":"${{ parameters.name }}","title":"${{ parameters.name }}","description":"${{ parameters.name }}"}

    - id: log-workflow-link
      name: Print GitHub Actions link
      action: debug:log
      input:
        message: >-
          GitHub Actions workflow triggered: https://github.com/tommyliverani/highway-to-cloud/actions/workflows/templater.yaml