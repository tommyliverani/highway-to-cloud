apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: create-s3-bucket
  title: AWS S3 Create bucket
  description: Automatizza la creazione di un bucket S3 su AWS

spec:
  owner: team-platform
  type: infrastructure

  parameters:
    - title: Dettagli del Bucket
      required:
        - bucketName
      properties:
        bucketName:
          title: Nome del Bucket S3
          type: string
          description: Verrà validato secondo le convenzioni AWS.

  steps:

    - id: clone-resource-repo
      name: Clonazione repository sorgente
      action: fetch:plain
      input:
        url: https://github.com/tommyliverani/highway-to-cloud.git
        targetPath: ./resources
    
    - id: clone-template-repo
      name: Clonazione repository template
      action: fetch:plain
      input:
        url: https://github.com/tommyliverani/highway-to-cloud.git
        targetPath: ./templates

    

    


