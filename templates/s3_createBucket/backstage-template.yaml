apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: create-s3-bucket
  title: AWS S3 Create bucket
  description: Automatizza la creazione di un bucket S3 su AWS

spec:
  owner: team-platform
  type: infrastructure

  parameters:
    - title: Dettagli del Bucket
      required:
        - bucketName
      properties:
        bucketName:
          title: Nome del Bucket S3
          type: string
          description: Verrà validato secondo le convenzioni AWS.

  steps:

    - id: clone-remote-repo
      name: Clonazione repository sorgente
      action: fetch:plain
      input:
        url: https://github.com/tommyliverani/highway-to-cloud.git
        targetPath: ./resources


    - id: init-git
      name: Inizializzazione repository Git locale
      action: shell:command
      input:
        command: |
          git init
          git remote add origin https://github.com/tommyliverani/highway-to-cloud.git
          git fetch origin
          git checkout -b feature/${{ context.task.id }}-${{ parameters.bucketName }}
        workingDirectory: ./resources