apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: enable-storage-access
  title: Enable storage access
  description: Enable the access to a remote storage for a specific virtual machine

spec:
  owner: team-platform
  type: infrastructure

  parameters:
    - title: Storage Access Configuration
      description: Storage access configuration for a virtual machine
      required:
        - vm_name
        - bucket_name

      properties:

        vm_name:
          title: VM name
          type: string
          description: Name of the virtual machine resource that needs access
          ui:autofocus: true

        bucket_name:
          title: Bucket name
          type: string
          description: Name of the storage bucket the VM must access
          ui:autofocus: true

  steps:

    - id: run-templater-workflow
      name: Run templater workflow
      action: github:actions:dispatch

      input:
        repoUrl: github.com?owner=tommyliverani&repo=highway-to-cloud
        workflowId: templater.yaml
        branchOrTagName: main

        workflowInputs:

          operation_id: enable_storage_access
          resource_id: ${{ parameters.vm_name }}

          backstage_params: >-
            {
              "vm_name": "${{ parameters.vm_name }}",
              "bucket_name": "${{ parameters.bucket_name }}"
            }

    - id: log-workflow-link
      name: Print GitHub Actions link

      action: debug:log

      input:
        message: >-
          GitHub Actions workflow triggered:
          https://github.com/tommyliverani/highway-to-cloud/actions/workflows/templater.yaml