apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: enable-storage-retention
  title: Enable storage retention
  description: Enables data retention on a remote storage for a defined period of time

spec:
  owner: team-platform
  type: infrastructure

  parameters:
    - title: Storage configuration
      description: Remote storage configuration
      required:
        - storage_name
        - retention_days

      properties:

        storage_name:
          title: Remote storage name
          type: string
          description: Name of the storage resource where retention will be enabled
          ui:autofocus: true

        retention_days:
          title: Retention period
          type: integer
          description: Number of days for which data must be retained
          minimum: 1

  steps:

    - id: run-templater-workflow
      name: Run templater workflow
      action: github:actions:dispatch

      input:
        repoUrl: github.com?owner=tommyliverani&repo=highway-to-cloud
        workflowId: templater.yaml
        branchOrTagName: main

        workflowInputs:

          operation_id: enable_storage_retention
          resource_id: ${{ parameters.storage_name }}

          backstage_params: >-
            {
              "storage_name": "${{ parameters.storage_name }}",
              "retention_days": ${{ parameters.retention_days }}
            }

    - id: log-workflow-link
      name: Print GitHub Actions link

      action: debug:log

      input:
        message: >-
          GitHub Actions workflow triggered:
          https://github.com/tommyliverani/highway-to-cloud/actions/workflows/templater.yaml